<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mood</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <a href="index.html" class="back-btn">← Back</a>

    <p class="subtitle">
      Reflect on your feelings and track your emotional journey 🌿
    </p>

    <h2>How do you feel today?</h2>
    <h3 id="selectedDateText"></h3>
    <div class="emojis">
      <span onclick="selectMood('happy', this)">😊</span>
      <span onclick="selectMood('sad', this)">😢</span>
      <span onclick="selectMood('tired', this)">😴</span>
      <span onclick="selectMood('angry', this)">😡</span>
    </div>

    <textarea id="moodNote" placeholder="Write about your day...."></textarea>

    <br />

    <button onclick="saveMood()">Save Mood</button>

    <p id="todayMood"></p>
    <p id="moodMessage"></p>

    <hr />
    <h3>📅 Mood Calendar</h3>

    <div class="calendar">
      <div class="calendar-header">
        <button onclick="prevMonth()">⬅</button>
        <h4 id="monthYear"></h4>
        <button onclick="nextMonth()">➡</button>
      </div>

      <div class="calendar-days">
        <div>Sun</div>
        <div>Mon</div>
        <div>Tue</div>
        <div>Wed</div>
        <div>Thu</div>
        <div>Fri</div>
        <div>Sat</div>
      </div>

      <div id="calendarDates" class="calendar-dates"></div>
    </div>

    <hr />

    <h3>📜 Recent Moods</h3>
    <div id="moodHistory"></div>

    <div id="popup" class="popup">
      <div class="popup-content">
        <span class="close-btn" onclick="closePopup()">×</span>
        <h4 id="selected-date">Selected Day</h4>
        <p id="detailDate"></p>
        <p id="detailMood"></p>
        <div class="note-row">
          <p id="detailNote"></p>

          <img
            src="assets/edit.png"
            class="edit-icon"
            onclick="enableEditNote()"
          />
        </div>

        <textarea id="editNoteInput" style="display: none"></textarea>
        <button
          id="saveNoteBtn"
          style="display: none"
          onclick="saveEditedNote()"
        >
          Save
        </button>
      </div>
    </div>

    <script src="mood.js"></script>
    <script src="script.js"></script>

    <script>
      showTodayMood();
      loadMoodHistory();
      moodMessage();
      renderCalendar();
    </script>
  </body>
</html>
