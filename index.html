<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>LunaLog</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <button id="themeToggle" class="theme-btn" onclick="toggleTheme()">
      <img id="themeIcon" src="assets/moon.png" alt="theme" />
    </button>
    <h1>🌙 LunaLog</h1>

    <div class="streak">🔥 Streak: <span id="streakCount">0</span> days</div>
    <div class="best-streak">
      🏆 Best: <span id="bestStreakCount">0</span> days
    </div>

    <div class="container">
      <a href="mood.html" class="card">Mood Tracker</a>
      <a href="sleep.html" class="card">Sleep Tracker</a>
      <a href="habits.html" class="card">Habit Tracker</a>
      <a href="insights.html" class="card">Insights</a>
      <a href="journal.html" class="card">Daily Journal</a>
    </div>

    <div class="dashboard">
      <div class="dash-card">
        <h4>Mood</h4>
        <p id="homeMood"></p>
      </div>

      <div class="dash-card">
        <h4>Sleep</h4>
        <p id="homeSleep"></p>
      </div>

      <div class="dash-card">
        <h4>Habits</h4>
        <p id="homeHabits"></p>
      </div>
    </div>

    <div class="chart-box small-chart">
      <h3 class="chart-title">Sleep Chart</h3>
      <canvas id="miniSleepChart"></canvas>
    </div>

    <p id="smartWarning" class="warning"></p>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
    <script>
      updateStreak();

      document.getElementById("streakCount").innerText = getStreak();
      document.getElementById("bestStreakCount").innerText = getBestStreak();

      loadHomeData();
      renderMiniChart();
      loadTheme();
    </script>

    <p class="privacy-note">🔒 Your data stays private on your device</p>
    <footer class="footer">Designed by AVA 🌿</footer>
  </body>
</html>
