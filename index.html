<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>LunaLog</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>🌙 LunaLog</h1>

    <div class="streak">🔥 Streak: <span id="streakCount">0</span> days</div>
    <div class="best-streak">
      🏆 Best: <span id="bestStreakCount">0</span> days
    </div>

    <div class="container">
      <a href="mood.html" class="card">Mood Tracker</a>
      <a href="sleep.html" class="card">Sleep Tracker</a>
      <a href="habits.html" class="card">Habit Tracker</a>
      <a href="insights.html" class="card">Insights</a>
    </div>

    <script src="script.js"></script>
    <script>
      updateStreak();

      document.getElementById("streakCount").innerText = getStreak();
      document.getElementById("bestStreakCount").innerText = getBestStreak();
    </script>
  </body>
</html>
