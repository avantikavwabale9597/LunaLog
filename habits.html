<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Habit Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <a href="index.html" class="back-btn">← Back</a>

    <h2>🌿 Habit Tracker</h2>
    <p class="subtitle">Build consistency, one day at a time</p>

    <div class="habit-container">
      <div class="add-habit">
        <input type="text" id="habitInput" placeholder="Enter new habit...." />
        <input type="number" id="daysInput" placeholder="Days (e.g. 7)" />
        <select id="categoryInput">
          <option value="Health">Health</option>
          <option value="Study">Study</option>
          <option value="Fitness">Fitness</option>
          <option value="Personal">Personal</option>
        </select>
        <button onclick="addHabit()">Add</button>
      </div>

      <h3 id="progressText"></h3>

      <div class="progress-bar">
        <div id="progressFill"></div>
      </div>

      <p id="smartMessage"></p>
      <p id="weeklyStats"></p>

      <div id="habitList"></div>

      <div class="chart-row">
        <canvas id="habitDonut"></canvas>
        <div id="chartLegend" class="custom-legend"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="habits.js"></script>
    <script src="script.js"></script>

    <script>
      loadTheme();
    </script>
  </body>
</html>
